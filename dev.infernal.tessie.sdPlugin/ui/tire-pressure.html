<!doctype html>
<html>
  <head lang="en">
    <title>Tire Pressure</title>
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="Tessie Access Token">
      <sdpi-password
        global
        setting="tessieAccessToken"
        required
      ></sdpi-password>
    </sdpi-item>
    <sdpi-item label="Vehicle">
      <sdpi-select
        setting="vin"
        datasource="getVehicles"
        loading="Fetching your vehicles..."
        placeholder="Select your vehicle"
      ></sdpi-select>
    </sdpi-item>
    <sdpi-item label="Pressure Unit">
      <sdpi-select
        setting="pressureFormat"
        placeholder="Select a pressure format"
      >
        <option value="bar">bar</option>
        <option value="kpa">kPa</option>
        <option value="psi">psi</option>
      </sdpi-select>
    </sdpi-item>
  </body>
</html>
